name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # No lockfile committed yet (Sprint 000). Switch to --frozen-lockfile once pnpm-lock.yaml lands.
      - run: pnpm install --no-frozen-lockfile
      # Typecheck the pure TS packages (domain/engine/parser). Mobile (Expo) typecheck/build added in Sprint 001.
      - run: pnpm typecheck:packages
      - run: pnpm test
